# This file stores test-profile settings for isolated integration tests.
spring.datasource.url=jdbc:h2:mem:chesscoach;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

app.upload.base-dir=target/test-uploads
app.upload.trainee-photo-subdir=trainee-photos
app.report.export-dir=target/test-uploads/reports
