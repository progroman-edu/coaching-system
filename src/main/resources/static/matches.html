<!-- This file renders the match scheduling and results page. -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>if(localStorage.getItem("sidebarOpen")==="1"){document.documentElement.classList.add("sidebar-open-persist");}</script>
    <title>Matches</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div class="layout">
    <button id="sidebarToggle" class="sidebar-toggle secondary" type="button" aria-label="Toggle sidebar">&#9776;</button>
    <aside class="sidebar">
        <div class="brand"> </div>
        <a class="nav-link" href="/index.html">Dashboard</a>
        <a class="nav-link" href="/trainees.html">Trainees</a>
        <a class="nav-link active" href="/matches.html">Matches</a>
        <a class="nav-link" href="/attendance.html">Attendance</a>
        <a class="nav-link" href="/reports.html">Reports</a>
    </aside>
    <main class="content">
        <div id="msg" class="msg" style="display:none;"></div>
        <div class="panel">
            <h1 class="title">Match Scheduling & Results</h1>
        </div>

        <section class="panel">
            <h3>Create Match</h3>
            <form id="scheduleForm" class="grid cols-2">
                <div><label>Scheduled Date</label><input type="date" name="scheduledDate" required></div>
                <div><label>Format</label><select name="format"><option>SWISS</option><option>ROUND_ROBIN</option></select></div>
                <div style="grid-column:1 / -1;">
                    <label>Select Participants</label>
                    <div id="scheduleProfiles" class="participant-picker"></div>
                    <div id="scheduleSelectedCount" class="participant-meta">Selected: 0</div>
                    <input type="hidden" name="traineeIds">
                </div>
                <div style="grid-column:1 / -1;"><button type="submit">Create Match</button></div>
            </form>
        </section>

        <section class="panel">
            <h3>Generate Pairings</h3>
            <form id="pairForm" class="grid cols-2">
                <div><label>Format</label><select name="format"><option>SWISS</option><option>ROUND_ROBIN</option></select></div>
                <div><label>Round Number</label><input type="number" name="roundNumber" value="1" required></div>
                <div style="grid-column:1 / -1;">
                    <label>Select Participants</label>
                    <div id="pairProfiles" class="participant-picker"></div>
                    <div id="pairSelectedCount" class="participant-meta">Selected: 0</div>
                    <input type="hidden" name="traineeIds">
                </div>
                <div style="grid-column:1 / -1;"><button class="secondary" type="submit">Generate</button></div>
            </form>
        </section>

        <section class="panel">
            <h3>Submit Result</h3>
            <form id="resultForm" class="grid cols-4">
                <div style="grid-column:1 / -1;">
                    <label>Select Match</label>
                    <select name="matchRef" required>
                        <option value="">Select a loaded F2F match</option>
                    </select>
                    <!-- Real backend ID is set automatically from selected match reference. -->
                    <input type="hidden" name="matchId" required>
                </div>
                <div style="grid-column:1 / -1;">
                    <label>Result</label>
                    <select name="resultType" required>
                        <option value="">Select result</option>
                        <option value="WHITE_WIN">White won (1-0)</option>
                        <option value="BLACK_WIN">Black won (0-1)</option>
                        <option value="DRAW">Draw (0.5-0.5)</option>
                    </select>
                </div>
                <div style="grid-column:1 / -1;"><button type="submit">Record Result</button></div>
            </form>
        </section>

        <section class="panel">
            <h3>Match History by Trainee</h3>
            <form id="historyForm" class="grid">
                <div>
                    <label>History Mode</label>
                    <select name="historyMode">
                        <option value="OFFLINE">Offline (F2F)</option>
                        <option value="ONLINE">Online (Chess.com)</option>
                    </select>
                </div>
                <div>
                    <label>Start Date Filter</label>
                    <input type="date" name="dateFilter">
                </div>
                <div>
                    <label>Format Filter</label>
                    <select name="formatFilter">
                        <option value="ALL">All</option>
                        <option value="SWISS">SWISS</option>
                        <option value="ROUND_ROBIN">ROUND_ROBIN</option>
                        <option value="RAPID">RAPID</option>
                        <option value="BLITZ">BLITZ</option>
                        <option value="BULLET">BULLET</option>
                        <option value="DAILY">DAILY</option>
                        <option value="OTHER">OTHER</option>
                    </select>
                </div>
                <div>
                    <label>Select Trainee Profile</label>
                    <div id="historyProfiles" class="participant-picker"></div>
                    <div id="historySelectedLabel" class="participant-meta">Selected: none</div>
                    <input type="hidden" name="traineeId" required>
                </div>
                <button class="secondary" type="submit">Load History</button>
            </form>
        </section>

        <section class="panel">
            <table>
                <thead>
                <tr>
                    <th>Match Ref</th>
                    <th>Date</th>
                    <th>Format</th>
                    <th>White</th>
                    <th>Black</th>
                    <th>Opening</th>
                    <th>Result</th>
                </tr>
                </thead>
                <tbody id="matchRows"></tbody>
            </table>
        </section>
    </main>
</div>
<div id="loadingOverlay" class="loading-overlay" aria-hidden="true">
    <div class="loading-box">
        <span class="spinner" aria-hidden="true"></span>
        <span>Loading...</span>
    </div>
</div>
<script type="module" src="/js/matches.js"></script>
    <script src="/js/sidebar.js"></script>
</body>
</html>
