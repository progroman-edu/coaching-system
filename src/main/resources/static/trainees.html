<!-- This file renders the trainee management page. -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>if(localStorage.getItem("sidebarOpen")==="1"){document.documentElement.classList.add("sidebar-open-persist");}</script>
    <title>Trainees</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div class="layout">
    <button id="sidebarToggle" class="sidebar-toggle secondary" type="button" aria-label="Toggle sidebar">&#9776;</button>
    <aside class="sidebar">
        <div class="brand"> </div>
        <a class="nav-link" href="/index.html">Dashboard</a>
        <a class="nav-link active" href="/trainees.html">Trainees</a>
        <a class="nav-link" href="/matches.html">Matches</a>
        <a class="nav-link" href="/attendance.html">Attendance</a>
        <a class="nav-link" href="/reports.html">Reports</a>
    </aside>
    <main class="content">
        <div id="msg" class="msg" style="display:none;"></div>

        <section class="panel">
            <h1 class="title">Trainees</h1>
            <p class="subtitle">Performance-first roster with search, filters, sorting, and coach workflow actions.</p>
        </section>

        <section class="panel">
            <h3 id="traineeFormTitle">Create Trainee</h3>
            <form id="traineeForm" class="grid cols-2">
                <input type="hidden" name="id">
                <div><label>Name</label><input name="name" required></div>
                <div><label>Age</label><input type="number" name="age" required></div>
                <div><label>Address</label><input name="address" required></div>
                <div><label>Grade Level</label><input name="gradeLevel" required></div>
                <div><label>Course/Strand</label><input name="courseStrand" required></div>
                <div><label>Chess.com Username</label><input name="chessUsername" placeholder="e.g. hikaru" required></div>
                <div>
                    <label id="highestRatingFieldLabel">Highest Rating (Rapid)</label>
                    <input type="number" name="highestRatingDisplay" readonly>
                </div>
                <div style="grid-column:1 / -1; display:flex; gap:8px;">
                    <button id="saveTraineeBtn" type="submit">Save Trainee</button>
                    <button id="cancelEditBtn" type="button" class="secondary" style="display:none;">Cancel Edit</button>
                </div>
            </form>
        </section>

        <section class="panel">
            <h3>Roster Controls</h3>
            <form id="filterForm" class="grid cols-4">
                <div style="grid-column:1 / -1;">
                    <label>Search</label>
                    <input type="search" name="search" placeholder="Search by trainee name">
                </div>
                <div><label>Course/Strand</label><input name="courseStrand"></div>
                <div>
                    <label>Mode Filter</label>
                    <select name="mode">
                        <option value="all" selected>All</option>
                        <option value="rapid">Rapid</option>
                        <option value="blitz">Blitz</option>
                        <option value="bullet">Bullet</option>
                        <option value="default">Default</option>
                    </select>
                </div>
                <div><label>Rating Min</label><input type="number" name="ratingMin"></div>
                <div><label>Rating Max</label><input type="number" name="ratingMax"></div>
                <div><label>Age Min</label><input type="number" name="ageMin"></div>
                <div><label>Age Max</label><input type="number" name="ageMax"></div>
                <div>
                    <label>Rank Order</label>
                    <select name="rankingOrder">
                        <option value="asc" selected>Top Rank First</option>
                        <option value="desc">Bottom Rank First</option>
                    </select>
                </div>
                <div>
                    <label>Sync Mode</label>
                    <select id="syncMode">
                        <option value="rapid" selected>Rapid</option>
                        <option value="blitz">Blitz</option>
                        <option value="bullet">Bullet</option>
                    </select>
                </div>
                <div>
                    <label>Page Size</label>
                    <select name="size">
                        <option value="10">10</option>
                        <option value="20" selected>20</option>
                        <option value="50">50</option>
                    </select>
                </div>
                <div style="display:flex; gap:8px; align-items:flex-end;">
                    <button type="submit">Apply</button>
                </div>
                <div style="display:flex; gap:8px; align-items:flex-end;">
                    <button id="clearFiltersBtn" type="button" class="secondary">Clear</button>
                </div>
                <div style="display:flex; gap:8px; align-items:flex-end;">
                    <button id="syncRatingsBtn" type="button" class="secondary">Sync Ratings</button>
                </div>
            </form>
            <div id="activeFilterChips" class="filter-chips"></div>
        </section>

        <section class="panel">
            <div class="table-headline">
                <h3>Trainee Leaderboard</h3>
                <div class="table-pagination">
                    <button id="prevPageBtn" type="button" class="secondary">Prev</button>
                    <span id="pageIndicator">Page 1</span>
                    <button id="nextPageBtn" type="button" class="secondary">Next</button>
                </div>
            </div>
            <div class="table-wrap">
                <table class="trainee-table">
                    <thead>
                    <tr>
                        <th><button type="button" class="sort-btn" data-sort="ranking">Rank</button></th>
                        <th><button type="button" class="sort-btn" data-sort="name">Trainee</button></th>
                        <th><button type="button" class="sort-btn" data-sort="currentRating">Current / Peak</button></th>
                        <th><button type="button" class="sort-btn" data-sort="latestRatingChange">Δ Latest</button></th>
                        <th><button id="modePeakHeader" type="button" class="sort-btn" data-sort="modePeak">Mode Peak (Rapid)</button></th>
                        <th><button type="button" class="sort-btn" data-sort="courseStrand">Course</button></th>
                        <th><button type="button" class="sort-btn" data-sort="attendancePercentageLast30Days">Attendance (30d)</button></th>
                        <th><button type="button" class="sort-btn" data-sort="lastActivityAt">Last Activity</button></th>
                        <th>Chess.com</th>
                        <th>Coach Notes</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody id="traineeRows"></tbody>
                </table>
            </div>
        </section>

        <section class="panel">
            <h3>Upload Trainee Photo</h3>
            <form id="photoForm" class="grid cols-2">
                <div><label>Trainee ID</label><input type="number" name="traineeId" required></div>
                <div><label>Image File</label><input type="file" name="file" accept="image/*" required></div>
                <div style="grid-column:1 / -1;"><button class="secondary" type="submit">Upload</button></div>
            </form>
        </section>
    </main>
</div>
<script type="module" src="/js/trainees.js"></script>
<script src="/js/sidebar.js"></script>
</body>
</html>
