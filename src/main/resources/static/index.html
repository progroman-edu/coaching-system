<!-- This file renders the dashboard page for coach analytics. -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>if(localStorage.getItem("sidebarOpen")==="1"){document.documentElement.classList.add("sidebar-open-persist");}</script>
    <script src="/js/page-stability.js"></script>
    <title>Coach Dashboard</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div class="layout">
    <button id="sidebarToggle" class="sidebar-toggle secondary" type="button" aria-label="Toggle sidebar">&#9776;</button>
    <aside class="sidebar">
        <div class="brand"> </div>
        <a class="nav-link active" href="/index.html">Dashboard</a>
        <a class="nav-link" href="/trainees.html">Trainees</a>
        <a class="nav-link" href="/matches.html">Tournament</a>
        <a class="nav-link" href="/match-history.html">Match History</a>
        <a class="nav-link" href="/attendance.html">Attendance</a>
        <a class="nav-link" href="/reports.html">Reports</a>
    </aside>
    <main class="content">
        <div id="msg" class="msg" style="display:none;"></div>
        <div class="panel">
            <h1 class="title">Coach Dashboard</h1>
            <p class="subtitle">Live analytics from backend API.</p>
        </div>
        <section class="grid cols-4">
            <article class="panel kpi">
                <p class="subtitle">Total Trainees</p>
                <h2 id="totalTrainees">0</h2>
            </article>
            <article class="panel kpi">
                <p class="subtitle">Average Rating</p>
                <h2 id="avgRating">0.00</h2>
            </article>
            <article class="panel kpi">
                <p class="subtitle">Attendance %</p>
                <h2 id="attendancePct">0.0%</h2>
            </article>
            <article class="panel kpi">
                <p class="subtitle">Matches Played</p>
                <h2 id="matchesPlayed">0</h2>
            </article>
        </section>

        <section class="panel">
            <h3>Analytics & Reports</h3>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem;">
                <a href="/analytics/performance.html" class="secondary" style="padding: 1rem; text-decoration: none; text-align: center; border-radius: 4px; display: block;">
                    Performance Analytics
                </a>
                <div class="panel">
                    <h3 style="margin-top: 0;">Rating Improvement Preview</h3>
                    <form id="trendForm" class="row">
                        <input type="number" id="trendTraineeId" placeholder="Trainee ID for trend" required>
                        <button class="secondary" type="submit">Load Trend</button>
                    </form>
                    <pre id="trendOutput">[]</pre>
                </div>
            </div>
        </section>
    </main>
</div>
<script type="module" src="/js/analytics.js"></script>
    <script src="/js/sidebar.js"></script>
</body>
</html>
