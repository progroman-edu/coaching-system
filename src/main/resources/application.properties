# This file stores runtime configuration for database, uploads, and app behavior.
spring.application.name=main
# MySQL Connection
spring.datasource.url=${APP_DB_URL:jdbc:mysql://localhost:3306/chess_coach_db?serverTimezone=UTC}
spring.datasource.username=${APP_DB_USERNAME:root}
spring.datasource.password=${APP_DB_PASSWORD:pass123}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=false

# Logging
logging.level.root=INFO
logging.level.com.chesscoach.main=DEBUG
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Multipart File Upload (for trainee photos)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Simplified ELO configuration
app.rating.k-factor=20
app.rating.default=1200

# Local upload storage
app.upload.base-dir=${APP_UPLOAD_BASE_DIR:uploads}
app.upload.trainee-photo-subdir=${APP_UPLOAD_TRAINEE_PHOTO_SUBDIR:trainee-photos}

# Reporting export storage
app.report.export-dir=${APP_REPORT_EXPORT_DIR:uploads/reports}

# Chess.com PubAPI integration
app.chesscom.base-url=${APP_CHESSCOM_BASE_URL:https://api.chess.com/pub}
app.chesscom.user-agent=${APP_CHESSCOM_USER_AGENT:ChessCoachMain/1.0 (contact: coach@example.com)}
app.chesscom.timeout-seconds=${APP_CHESSCOM_TIMEOUT_SECONDS:15}
app.chesscom.max-archives=${APP_CHESSCOM_MAX_ARCHIVES:24}
app.chesscom.retry-max-attempts=${APP_CHESSCOM_RETRY_MAX_ATTEMPTS:3}
app.chesscom.retry-backoff-multiplier=${APP_CHESSCOM_RETRY_BACKOFF_MULTIPLIER:2}
app.maintenance.allow-reset-test-data=${APP_ALLOW_RESET_TEST_DATA:false}

# Coach configuration
app.coach.default-email=${APP_COACH_DEFAULT_EMAIL:coach@local}
app.coach.default-name=${APP_COACH_DEFAULT_NAME:Default Coach}
app.coach.default-phone=${APP_COACH_DEFAULT_PHONE:N/A}

# Caching configuration
spring.cache.type=simple
spring.cache.cache-names=chesscom_ratings
spring.cache.simple.spec=maximumSize=1000,expireAfterWrite=30m

# Disable devtools auto-restart and browser live reload to prevent tab-switch refresh behavior
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false
spring.devtools.livereload.port=0

# Error handling configuration
server.error.whitelabel.enabled=false
spring.mvc.throw-exception-if-no-handler-found=true
# Note: We keep spring.web.resources.add-mappings=true (default) to serve static files
# 404s for API endpoints will be caught by the exception handler
