# This file stores runtime configuration for database, uploads, and app behavior.
spring.application.name=main
# MySQL Connection
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/chess_coach_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:pass123}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Multipart File Upload (for trainee photos)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Simplified ELO configuration
app.rating.k-factor=20

# Local upload storage
app.upload.base-dir=${APP_UPLOAD_BASE_DIR:uploads}
app.upload.trainee-photo-subdir=${APP_UPLOAD_TRAINEE_PHOTO_SUBDIR:trainee-photos}

# Reporting export storage
app.report.export-dir=${APP_REPORT_EXPORT_DIR:uploads/reports}

# Chess.com PubAPI integration
app.chesscom.base-url=${APP_CHESSCOM_BASE_URL:https://api.chess.com/pub}
app.chesscom.user-agent=${APP_CHESSCOM_USER_AGENT:ChessCoachMain/1.0 (contact: coach@example.com)}
app.chesscom.timeout-seconds=${APP_CHESSCOM_TIMEOUT_SECONDS:15}
app.chesscom.max-archives=${APP_CHESSCOM_MAX_ARCHIVES:24}

