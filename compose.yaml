# This file defines the local multi-container runtime stack for app and database.
services:
  mysql:
    image: mysql:8.4
    container_name: chesscoach-mysql
    environment:
      MYSQL_DATABASE: chess_coach_db
      MYSQL_USER: ${MYSQL_USER:-chesscoach}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chesscoach-app
    environment:
      APP_DB_URL: jdbc:mysql://mysql:3306/chess_coach_db?serverTimezone=UTC
      APP_DB_USERNAME: ${MYSQL_USER:-chesscoach}
      APP_DB_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      APP_UPLOAD_BASE_DIR: /app/uploads
      APP_REPORT_EXPORT_DIR: /app/uploads/reports
    ports:
      - "8080:8080"
    volumes:
      - app_uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
  app_uploads:

