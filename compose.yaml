services:
  mysql:
    image: mysql:8.4
    container_name: chesscoach-mysql
    environment:
      MYSQL_DATABASE: chess_coach_db
      MYSQL_USER: chesscoach
      MYSQL_PASSWORD: chesscoach
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chesscoach-app
    environment:
      DB_URL: jdbc:mysql://mysql:3306/chess_coach_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      DB_USERNAME: chesscoach
      DB_PASSWORD: chesscoach
      APP_UPLOAD_BASE_DIR: /app/uploads
      APP_REPORT_EXPORT_DIR: /app/uploads/reports
    ports:
      - "8080:8080"
    volumes:
      - app_uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
  app_uploads:
